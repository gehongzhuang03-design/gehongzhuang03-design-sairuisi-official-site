services:
  - type: web
    name: sairuisi-official-site
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: ADMIN_TOKEN
        sync: false
      - key: AI_BASE_URL
        value: https://vip.auto-code.net/v1
      - key: TEXT_API_KEY
        sync: false
      - key: TEXT_MODEL
        value: glm-5.2
      - key: IMAGE_API_KEY
        sync: false
      - key: IMAGE_MODEL
        value: gpt-image-2
      - key: STUDIO_DAILY_TIME
        value: "08:00"
      - key: LEAD_EMAIL_TO
        value: 1760772194@qq.com
      - key: SMTP_HOST
        value: smtp.qq.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
